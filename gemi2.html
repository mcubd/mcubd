
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#3b82f6;--txt:#f8fafc;--muted:#94a3b8;--ok:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}
.container{background:var(--card);border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.3);padding:30px;max-width:600px;width:100%;text-align:center}
h1{font-size:1.8rem;margin-bottom:8px}
.sub{color:var(--muted);margin-bottom:24px;font-size:.95rem}
.status-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px}
.dot{width:12px;height:12px;border-radius:50%;background:#ef4444;transition:background .3s}
.dot.on{background:var(--ok)}
.dot.speaking{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-txt{font-weight:500;font-size:.95rem}
.controls{display:flex;flex-direction:column;gap:12px}
button{border:none;padding:14px 28px;font-size:1rem;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s}
#startBtn{background:var(--accent);color:#fff}
#startBtn:hover{opacity:.9;transform:translateY(-1px)}
#startBtn:disabled{background:#475569;cursor:not-allowed;transform:none}
#stopBtn{background:#ef4444;color:#fff;display:none}
#stopBtn:hover{opacity:.9}
.badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:20px;background:#134e4a;color:#5eead4;margin-left:8px;vertical-align:middle}
.log-box{margin-top:24px;background:#090d16;border-radius:8px;padding:14px;text-align:left;font-size:.88rem;max-height:180px;overflow-y:auto;border:1px solid #334155}
.log-entry{margin-bottom:5px;line-height:1.5}
.log-user{color:#60a5fa}
.log-gemini{color:#f43f5e}
.log-sys{color:var(--muted)}
.note{font-size:.75rem;color:var(--muted);margin-top:12px;line-height:1.5}
</style>

<div class="container">
  <h1>Gemini Live MCQ ভয়েস কুইজ <span class="badge">barge-in fixed</span></h1>
  <p class="sub">লাইভ অডিও সেশন শুরু করুন এবং বাংলায় উত্তর দিন।</p>

  <div class="status-row">
    <div id="statusDot" class="dot"></div>
    <div id="statusText" class="status-txt">Disconnected</div>
  </div>

  <div class="controls">
    <button id="startBtn">কুইজ শুরু করুন (Start Quiz)</button>
    <button id="stopBtn">কুইজ বন্ধ করুন (Stop Quiz)</button>
  </div>

  <div class="log-box" id="logBox">
    <div class="log-entry log-sys">সিস্টেম লগ এখানে দেখা যাবে...</div>
  </div>

  <p class="note">💡 AI কথা বলার সময় আপনি কথা বললে AI তাৎক্ষণিক থেমে যাবে।</p>
</div>

<script type="module">
import { GoogleGenAI } from 'https://esm.sh/@google/genai';

const API_KEY = "AIzaSyDPiSRbZrkXqbZiWqassehrwYYPvMuVleI";
const mcqList=[
  {id:1,question:"বাংলাদেশের রাজধানী কোথায়?",options:["A) চট্টগ্রাম","B) ঢাকা","C) খুলনা","D) সিলেট"],answer:"B"},
  {id:2,question:"আমাদের জাতীয় ফুল কোনটি?",options:["A) গোলাপ","B) শাপলা","C) জবা","D) সূর্যমুখী"],answer:"B"},
  {id:3,question:"কোন গ্রহকে লাল গ্রহ বলা হয়?",options:["A) বুধ","B) শুক্র","C) মঙ্গল","D) বৃহস্পতি"],answer:"C"}
];

const systemInstruction=`
তুমি একটি ইন্টারেক্টিভ MCQ কুইজ সহকারী। তোমার সাথে ব্যবহারকারী সম্পূর্ণ বাংলায় ভয়েস টু ভয়েস কথা বলবে।
১. কুইজের ডেটা: ${JSON.stringify(mcqList)}
    ২. সেশন শুরু হলে প্রথম প্রশ্ন এবং এর অপশনগুলো স্পষ্ট করে বাংলায় পড়ে শোনাবে।
    ৩. ব্যবহারকারী সঠিক অপশন (যেমন: 'B' বা 'ঢাকা') বললে বলবে "সঠিক উত্তর হয়েছে!" এবং পরবর্তী প্রশ্নটি করবে।
    ৪. ব্যবহারকারী ভুল উত্তর দিলে বলবে "ভুল উত্তর"। অন্য  কিছু  এক্সট্রা  কথা বলবে না 
    ৫. ব্যবহারকারী যদি বলে "skip" বা "পরের প্রশ্নে যাও", তবে বর্তমান প্রশ্ন বাদ দিয়ে পরবর্তী প্রশ্নে চলে যাবে।
    ৬. কথা বলার ভঙ্গি একদম স্বাভাবিক ও বন্ধুত্বপূর্ণ রাখবে। অতিরিক্ত কোনো ইংরেজি বা টেক্সট ফরম্যাটিং মুখে বলবে না।
    ৭. কথাবার্তা যত কম রাখতে পারো রাখবে 
`;

const startBtn=document.getElementById('startBtn');
const stopBtn=document.getElementById('stopBtn');
const statusDot=document.getElementById('statusDot');
const statusText=document.getElementById('statusText');
const logBox=document.getElementById('logBox');

let aiSession=null;
let playbackCtx=null;      // separate context just for playback
let recordCtx=null;        // separate context for mic recording
let micStream=null;
let processorNode=null;
let scheduledSources=[];   // track all queued AudioBufferSourceNodes
let nextPlayTime=0;
let aiIsSpeaking=false;    // true while AI audio is playing
let userSpokeWhileAI=false;// flag to detect barge-in

const ai=new GoogleGenAI({apiKey:API_KEY});

startBtn.addEventListener('click',startLiveQuiz);
stopBtn.addEventListener('click',stopLiveQuiz);

function log(msg,type='sys'){
  const d=document.createElement('div');
  d.className=`log-entry log-${type}`;
  d.innerText=type==='sys'?`[System] ${msg}`:type==='user'?`আপনি: ${msg}`:`জেমিনি: ${msg}`;
  logBox.appendChild(d);
  logBox.scrollTop=logBox.scrollHeight;
}

// ── BARGE-IN: stop all queued AI audio immediately ──
function interruptAIAudio(){
  if(!aiIsSpeaking) return;
  log("বাধা দেওয়া হয়েছে — AI থামছে...","sys");

  // Stop every scheduled source node
  for(const src of scheduledSources){
    try{ src.stop(); }catch(_){}
  }
  scheduledSources=[];
  nextPlayTime=0;
  aiIsSpeaking=false;
  setStatus('connected','Connected (Live)');

  // Tell Gemini we interrupted (sends an empty turn to cancel generation)
  if(aiSession){
    try{
      aiSession.sendRealtimeInput({audio:{data:'',mimeType:'audio/pcm;rate=16000'}});
    }catch(_){}
  }
}

function setStatus(state,label){
  statusDot.className='dot'+(state==='connected'?' on':state==='speaking'?' speaking':'');
  statusText.innerText=label;
}

async function startLiveQuiz(){
  try{
    log("মাইক্রোফোন ও অডিও সিস্টেম চালু করা হচ্ছে...");
    startBtn.disabled=true;

    playbackCtx=new AudioContext({sampleRate:24000});
    recordCtx=new AudioContext({sampleRate:16000});
    nextPlayTime=playbackCtx.currentTime;

    micStream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,sampleRate:16000}});

    log("জেমিনি লাইভ সেশনের সাথে যুক্ত হচ্ছে...");
    aiSession=await ai.live.connect({
      model:'gemini-2.0-flash-live-preview',
      config:{
        responseModalities:['audio'],
        systemInstruction:{parts:[{text:systemInstruction}]}
      },
      callbacks:{
        onopen:()=>{
          setStatus('connected','Connected (Live)');
          startBtn.style.display='none';
          stopBtn.style.display='block';
          log("সেশন সফলভাবে শুরু হয়েছে!");
          startAudioRecording();
        },
        onmessage:(r)=>handleServerMessage(r),
        onerror:(err)=>{ log("ত্রুটি: "+err.message); stopLiveQuiz(); },
        onclose:()=>{ log("সেশন বন্ধ হয়ে গেছে।"); stopLiveQuiz(); }
      }
    });
  }catch(e){
    log("শুরু করতে ব্যর্থ: "+e.message);
    startBtn.disabled=false;
  }
}

function startAudioRecording(){
  const src=recordCtx.createMediaStreamSource(micStream);
  processorNode=recordCtx.createScriptProcessor(4096,1,1);

  // Track amplitude — if user makes sound while AI speaks → barge-in
  let silenceFrames=0;
  const SILENCE_THRESHOLD=0.01;
  const SPEAK_FRAMES=3; // must detect speech for N frames before interrupting

  let speechFrameCount=0;

  processorNode.onaudioprocess=(e)=>{
    if(!aiSession) return;
    const buf=e.inputBuffer.getChannelData(0);

    // Calculate RMS amplitude
    let sum=0;
    for(let i=0;i<buf.length;i++) sum+=buf[i]*buf[i];
    const rms=Math.sqrt(sum/buf.length);

    if(rms>SILENCE_THRESHOLD){
      speechFrameCount++;
      if(aiIsSpeaking && speechFrameCount>=SPEAK_FRAMES){
        // User is speaking while AI plays — BARGE-IN
        interruptAIAudio();
        speechFrameCount=0;
      }
    } else {
      speechFrameCount=0;
    }

    // Send PCM to Gemini
    const pcm=new Int16Array(buf.length);
    for(let i=0;i<buf.length;i++){
      const s=Math.max(-1,Math.min(1,buf[i]));
      pcm[i]=s<0?s*0x8000:s*0x7FFF;
    }
    const b64=btoa(String.fromCharCode(...new Uint8Array(pcm.buffer)));
    aiSession.sendRealtimeInput({audio:{data:b64,mimeType:'audio/pcm;rate=16000'}});
  };

  src.connect(processorNode);
  processorNode.connect(recordCtx.destination);
}

function handleServerMessage(response){
  const content=response.serverContent;
  if(!content) return;

  if(content.inputTranscription) log(content.inputTranscription.text,'user');
  if(content.outputTranscription) log(content.outputTranscription.text,'gemini');

  if(content.modelTurn?.parts){
    for(const part of content.modelTurn.parts){
      if(part.inlineData?.data){
        playChunk(part.inlineData.data);
      }
    }
  }
}

function playChunk(b64){
  if(!playbackCtx) return;

  const bytes=new Uint8Array(atob(b64).split('').map(c=>c.charCodeAt(0)));
  const int16=new Int16Array(bytes.buffer);
  const f32=new Float32Array(int16.length);
  for(let i=0;i<int16.length;i++) f32[i]=int16[i]/32768.0;

  const audioBuf=playbackCtx.createBuffer(1,f32.length,24000);
  audioBuf.getChannelData(0).set(f32);

  const srcNode=playbackCtx.createBufferSource();
  srcNode.buffer=audioBuf;
  srcNode.connect(playbackCtx.destination);

  const start=Math.max(nextPlayTime,playbackCtx.currentTime);
  srcNode.start(start);
  nextPlayTime=start+audioBuf.duration;

  // Track as speaking
  aiIsSpeaking=true;
  setStatus('speaking','AI কথা বলছে...');
  scheduledSources.push(srcNode);

  // When this chunk ends, check if queue is empty
  srcNode.onended=()=>{
    scheduledSources=scheduledSources.filter(s=>s!==srcNode);
    if(scheduledSources.length===0){
      aiIsSpeaking=false;
      setStatus('connected','Connected (Live)');
    }
  };
}

function stopLiveQuiz(){
  setStatus('','Disconnected');
  startBtn.style.display='block';
  startBtn.disabled=false;
  stopBtn.style.display='none';

  // Stop all playing audio
  for(const s of scheduledSources){ try{s.stop()}catch(_){} }
  scheduledSources=[];
  aiIsSpeaking=false;

  if(processorNode){ processorNode.disconnect(); processorNode=null; }
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  if(recordCtx){ recordCtx.close(); recordCtx=null; }
  if(playbackCtx){ playbackCtx.close(); playbackCtx=null; }
  aiSession=null;
  log("সেশন বন্ধ করা হয়েছে।");
}
</script>
